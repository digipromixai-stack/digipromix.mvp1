[project]
id = "digipromix"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"
redirect_uri = ""

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# schedule-crawls cron DISABLED — Python Playwright crawler on Render handles all
# scheduling via Supabase pg_cron (render-keep-alive + trigger-crawl-4h)
[functions.schedule-crawls]
verify_jwt = false
# cron = "0 * * * *"

[functions.send-email-alert]
verify_jwt = false
cron = "*/5 * * * *"

[analytics]
enabled = true
port = 54327
backend = "postgres"
